<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema QA - Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container" style="max-width: 600px;"> <form id="cadastro-form">
            <h2>Cadastro de Pessoa Física</h2>
            
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" data-cy="input-nome" required>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" data-cy="input-cpf" placeholder="000.000.000-00" required>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label for="nascimento">Data de Nascimento</label>
                    <input type="date" id="nascimento" data-cy="input-nascimento" required>
                </div>
            </div>

            <div class="input-group">
                <label for="cep">CEP</label>
                <input type="text" id="cep" data-cy="input-cep" placeholder="00000-000" required>
            </div>

            <div class="input-group">
                <label for="endereco">Logradouro (Rua/Av)</label>
                <input type="text" id="endereco" data-cy="input-endereco" required>
            </div>

            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" data-cy="input-cidade" required>
                </div>
                <div class="input-group" style="flex: 0.5;">
                    <label for="estado">Estado</label>
                    <input type="text" id="estado" data-cy="input-estado" maxlength="2" required>
                </div>
            </div>

            <button type="submit" data-cy="btn-salvar-cadastro">Finalizar Cadastro</button>

            <div class="footer-links">
                <p>Já tem conta? <a href="login.html" data-cy="link-voltar-login">Voltar para Login</a></p>
            </div>
        </form>
    </div>
</body>
</html>
