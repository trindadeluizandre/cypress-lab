<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema QA - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <form id="login-form">
            <h2>Acesso ao Sistema</h2>
            
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" data-cy="input-email" required placeholder="Digite seu e-mail">
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" data-cy="input-password" required placeholder="Digite sua senha">
            </div>

            <button type="submit" data-cy="btn-login">Entrar</button>

            <div class="footer-links">
                <p>Não tem uma conta? <a href="cadastro.html" data-cy="link-cadastro">Cadastre-se aqui</a></p>
            </div>
        </form>
    </div>
</body>
</html>
